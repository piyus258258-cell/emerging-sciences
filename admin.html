<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - Emerging Sciences</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
      padding-top: 100px;
    }
    input {
      padding: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #00c6ff;
      border: none;
      cursor: pointer;
    }
    #panel {
      display: none;
      margin-top: 30px;
    }
  </style>
</head>
<body>

<h1>Admin Login</h1>

<input type="password" id="pass" placeholder="Enter Admin Password">
<button onclick="check()">Login</button>

<div id="panel">
  <h2>Welcome Admin</h2>
  <p>Upload your PDFs and Videos here.</p>
</div>

<script>
function check() {
  var password = document.getElementById("pass").value;
  if(password === "12345") {
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Wrong Password!");
  }
}
</script>

</body>
</html>
